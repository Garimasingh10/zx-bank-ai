<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zia - ZX Bank Virtual Assistant</title>
    <!-- Original Premium Font: Outfit -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Outfit', -apple-system, sans-serif;
        }
        body {
            background: #0f172a;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            position: relative;
            color: #f1f5f9;
        }
        /* Background Animated Blobs */
        .blob-bg {
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(79,70,229,0.3) 0%, rgba(15,23,42,0) 70%);
            top: -20%;
            left: -10%;
            filter: blur(80px);
            z-index: 0;
            animation: drift 20s infinite alternate linear;
        }
        .blob-2 {
            background: radial-gradient(circle, rgba(236,72,153,0.2) 0%, rgba(15,23,42,0) 70%);
            bottom: -20%;
            right: -10%;
            top: auto;
            left: auto;
            animation: drift-reverse 25s infinite alternate linear;
        }
        @keyframes drift {
            0% { transform: translate(0, 0); }
            100% { transform: translate(100px, 100px); }
        }
        @keyframes drift-reverse {
            0% { transform: translate(0, 0); }
            100% { transform: translate(-100px, -100px); }
        }
        /* Chat Container Glassmorphism */
        .chat-container {
            width: 100%;
            max-width: 500px;
            height: 90vh;
            background: rgba(30, 41, 59, 0.75);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 28px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.6);
            display: flex;
            flex-direction: column;
            z-index: 10;
            overflow: hidden;
            margin: 20px;
        }
        .chat-header {
            display: flex;
            align-items: center;
            padding: 24px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(15, 23, 42, 0.6);
        }
        .avatar {
            width: 44px;
            height: 44px;
            background: rgba(79, 70, 229, 0.25);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-right: 16px;
            border: 1px solid rgba(79, 70, 229, 0.5);
            box-shadow: 0 0 15px rgba(79, 70, 229, 0.3);
        }
        .avatar svg { width: 22px; height: 22px; color: #818cf8; }
        .chat-header h1 {
            font-size: 1.25rem;
            font-weight: 600;
            color: #fff;
            margin-bottom: 2px;
        }
        .chat-header p {
            font-size: 0.8rem;
            color: #94a3b8;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .chat-header p::before {
            content: '';
            width: 8px;
            height: 8px;
            background: #4ade80;
            border-radius: 50%;
            box-shadow: 0 0 8px #4ade80;
        }
        .messages-area {
            flex: 1;
            padding: 24px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .message {
            max-width: 90%;
            padding: 14px 18px;
            border-radius: 20px;
            font-size: 0.95rem;
            line-height: 1.6;
            animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            word-wrap: break-word;
        }
        /* Markdown Styling */
        .message p { margin-bottom: 12px; }
        .message p:last-child { margin-bottom: 0; }
        .message ul { margin-left: 20px; margin-bottom: 12px; list-style-type: disc; }
        .message li { margin-bottom: 6px; }
        .message strong { color: #fff; font-weight: 600; }
        .message table { border-collapse: collapse; width: 100%; margin: 10px 0; font-size: 0.85rem; }
        .message th, .message td { border: 1px solid rgba(255, 255, 255, 0.1); padding: 8px; text-align: left; }
        .message th { background: rgba(255, 255, 255, 0.05); color: #fff; }

        @keyframes popIn {
            0% { opacity: 0; transform: translateY(10px) scale(0.95); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }
        .bot-message {
            align-self: flex-start;
            background: rgba(51, 65, 85, 0.9);
            border-bottom-left-radius: 4px;
            color: #f1f5f9;
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        .user-message {
            align-self: flex-end;
            background: linear-gradient(135deg, #4f46e5 0%, #4338ca 100%);
            border-bottom-right-radius: 4px;
            color: #ffffff;
            box-shadow: 0 4px 15px rgba(79, 70, 229, 0.4);
        }
        .quick-actions {
            padding: 12px 24px;
            display: flex;
            gap: 10px;
            overflow-x: auto;
            scrollbar-width: none;
        }
        .quick-actions::-webkit-scrollbar { display: none; }
        .action-btn {
            white-space: nowrap;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #cbd5e1;
            padding: 10px 16px;
            border-radius: 24px;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s;
        }
        .action-btn:hover {
            background: rgba(79, 70, 229, 0.3);
            border-color: rgba(79, 70, 229, 0.6);
            color: #fff;
            transform: translateY(-1px);
        }
        .input-area {
            padding: 24px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            gap: 12px;
            background: rgba(15, 23, 42, 0.4);
        }
        #chat-input {
            flex: 1;
            background: rgba(15, 23, 42, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 16px;
            padding: 14px 20px;
            color: #fff;
            font-size: 0.95rem;
        }
        #send-btn {
            background: #4f46e5;
            border: none;
            border-radius: 16px;
            width: 52px;
            color: white;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        #send-btn:hover { background: #4338ca; transform: scale(1.05); }
        .citation {
            display: block;
            margin-top: 10px;
            font-size: 0.75rem;
            color: #93c5fd;
            background: rgba(59, 130, 246, 0.15);
            padding: 6px 10px;
            border-radius: 8px;
            border-left: 3px solid #3b82f6;
        }
        .typing-indicator { display: none; align-self: flex-start; padding: 14px 18px; background: rgba(51, 65, 85, 0.9); border-radius: 18px; border-bottom-left-radius: 4px; }
        .dot { display: inline-block; width: 6px; height: 6px; background: #94a3b8; border-radius: 50%; margin-right: 4px; animation: wave 1.3s linear infinite; }
        .dot:nth-child(2) { animation-delay: -1.1s; }
        .dot:nth-child(3) { animation-delay: -0.9s; margin-right: 0;}
        @keyframes wave { 0%, 60%, 100% { transform: translateY(0); } 30% { transform: translateY(-4px); } }
    </style>
</head>
<body>
    <div class="blob-bg"></div>
    <div class="blob-bg blob-2"></div>

    <div class="chat-container">
        <header class="chat-header">
            <div class="avatar">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M12 2a10 10 0 1 0 10 10A10 10 0 0 0 12 2zm0 18a8 8 0 1 1 8-8 8 8 0 0 1-8 8z"/>
                    <path d="M12 6v6l4 2"/>
                </svg>
            </div>
            <div>
                <h1>Zia</h1>
                <p>ZX Bank Virtual Assistant</p>
            </div>
        </header>

        <div id="messages-area" class="messages-area">
            <div id="initial-msg" class="message bot-message"></div>
            <div id="typing-indicator" class="typing-indicator">
                <span class="dot"></span><span class="dot"></span><span class="dot"></span>
            </div>
        </div>

        <div class="quick-actions">
            <button class="action-btn" onclick="sendQuickMessage('Small Talk')">Small Talk</button>
            <button class="action-btn" onclick="sendQuickMessage('Find Safe Deposit Boxes')">Find Safe Deposit Boxes</button>
            <button class="action-btn" onclick="sendQuickMessage('ATM Locations')">ATM Locations</button>
            <button class="action-btn" onclick="sendQuickMessage('Request Agent')">Request Agent</button>
            <button class="action-btn" onclick="sendQuickMessage('Test Adversarial Attack')">Test Adversarial Attack</button>
        </div>

        <div class="input-area">
            <input type="text" id="chat-input" placeholder="Type your message here..." autocomplete="off">
            <button id="send-btn" onclick="sendMessage()">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="22" y1="2" x2="11" y2="13"></line>
                    <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                </svg>
            </button>
        </div>
    </div>

    <script>
        const sessionId = "session_" + Math.random().toString(36).substr(2, 9);
        const messagesArea = document.getElementById("messages-area");
        const inputField = document.getElementById("chat-input");
        const typingIndicator = document.getElementById("typing-indicator");

        // 100% ROBUST MICRO-MARKDOWN RENDERER (INLINED)
        function parseMarkdown(text) {
            if (!text) return "";
            let html = text
                // Escape HTML tags to prevent XSS and preserve RAG tags
                .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")
                // Bold: **text** -> <strong>text</strong>
                .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                // Bullet points: - text or * text -> <li>text</li>
                .replace(/^[\s]*[-*]\s+(.*)$/gm, '<li>$1</li>')
                // Wrap contiguous <li> groups in <ul>
                .replace(/(<li>.*<\/li>)/gs, (match) => `<ul>${match}</ul>`)
                // Handle newlines: \n -> <br> (but not inside <ul> to avoid extra gaps)
                .replace(/\n/g, '<br>')
                .replace(/<\/ul><br>/g, '</ul>');
            return html;
        }

        const initialText = "Hello! I am **Zia**, ZX Bank's Virtual Assistant. \n\nI can help you with:\n- **Finding Branches & ATMs**\n- **Applying for Loans**\n- **Account & Card Services**\n\nHow can I be of service today?";
        document.getElementById("initial-msg").innerHTML = parseMarkdown(initialText);

        inputField.addEventListener("keypress", function(event) {
            if (event.key === "Enter") { sendMessage(); }
        });

        function sendQuickMessage(text) {
            inputField.value = text;
            sendMessage();
        }

        async function sendMessage() {
            const text = inputField.value.trim();
            if (!text) return;

            appendMessage(text, 'user-message');
            inputField.value = "";
            typingIndicator.style.display = "block";
            scrollToBottom();

            try {
                const response = await fetch("/chat", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ session_id: sessionId, query: text })
                });
                const data = await response.json();
                typingIndicator.style.display = "none";
                
                if (response.ok) {
                    appendHTMLMessage(data.response, 'bot-message');
                } else {
                    appendMessage(data.detail || "Error connecting to backend.", 'bot-message');
                }
            } catch (error) {
                typingIndicator.style.display = "none";
                appendMessage("Network error.", 'bot-message');
            }
        }

        function appendMessage(text, className) {
            const div = document.createElement("div");
            div.className = "message " + className;
            div.textContent = text;
            messagesArea.insertBefore(div, typingIndicator);
            scrollToBottom();
        }

        function appendHTMLMessage(content, className) {
            const div = document.createElement("div");
            div.className = "message " + className;
            
            let bodyText = content;
            let citationHtml = "";
            if (bodyText.includes("Source: ")) {
                const parts = bodyText.split(/(Source: [^\n|]+)/);
                bodyText = "";
                parts.forEach(p => {
                    if (p.startsWith("Source: ")) citationHtml += `<span class="citation">${p}</span>`;
                    else bodyText += p;
                });
            }
            
            div.innerHTML = parseMarkdown(bodyText) + citationHtml;
            messagesArea.insertBefore(div, typingIndicator);
            scrollToBottom();
        }

        function scrollToBottom() {
            setTimeout(() => { messagesArea.scrollTop = messagesArea.scrollHeight; }, 50);
        }
    </script>
</body>
</html>
